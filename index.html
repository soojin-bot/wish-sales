<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishtrend SCM</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F5F7FA;color:#0F172A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 24px}
.logo{width:56px;height:56px;background:#2563EB;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 20px}
h1{font-size:24px;font-weight:700;margin-bottom:8px}
p{font-size:14px;color:#64748B;margin-bottom:32px}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:480px}
.card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:12px;padding:20px;text-decoration:none;color:#0F172A;transition:box-shadow .2s;text-align:left}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card-icon{font-size:24px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-desc{font-size:12px;color:#64748B}
.card.main{grid-column:1/-1;border-color:#2563EB;background:linear-gradient(135deg,#EFF6FF,#fff)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">W</div>
  <h1>Wishtrend SCM</h1>
  <p>내부 운영 대시보드</p>
  <div class="cards">
    <a class="card main" href="/sales-dashboard">
      <div class="card-icon">📊</div>
      <div class="card-title">매출 실적 대시보드</div>
      <div class="card-desc">LAB별 / 채널별 / 국가별 실시간 매출 현황</div>
    </a>
    <a class="card" href="#" style="opacity:.4;cursor:not-allowed">
      <div class="card-icon">📦</div>
      <div class="card-title">재고 현황</div>
      <div class="card-desc">준비 중</div>
    </a>
    <a class="card" href="#" style="opacity:.4;cursor:not-allowed">
      <div class="card-icon">🚚</div>
      <div class="card-title">물류 현황</div>
      <div class="card-desc">준비 중</div>
    </a>
  </div>
</div>
</body>
</html>
